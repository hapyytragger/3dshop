<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velobuy</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    
    <style>
        :root { --primary: #5865F2; --bg: #f8f9fd; --success: #43b581; --gray: #99aab5; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #2c2f33; }
        
        header { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; padding: 20px 0; }
        .logo-text { font-size: 32px; font-weight: 900; color: var(--primary); letter-spacing: -1.5px; cursor: pointer; }

        .admin-link { position: fixed; bottom: 15px; right: 15px; font-size: 11px; color: #ccc; text-decoration: none; background: rgba(255,255,255,0.6); padding: 5px 10px; border-radius: 8px; z-index: 9999; }

        #admin-panel { display: none; background: white; padding: 25px; border-radius: 30px; margin-bottom: 40px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--primary); }
        #admin-panel input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 2px solid #eee; box-sizing: border-box; }

        #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; }
        .card { background: white; padding: 20px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; }
        .image-box { width: 100%; height: 220px; background: #eee; border-radius: 20px; margin-bottom: 15px; object-fit: cover; }
        .price-tag { color: var(--primary); font-weight: 800; font-size: 22px; margin-bottom: 15px; display: block; }
        .btn-buy { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <span class="logo-text" onclick="location.reload()">Velobuy</span>
    </header>

    <a href="javascript:void(0)" class="admin-link" onclick="checkAdmin()">Admin Panel</a>

    <div id="admin-panel">
        <h3 style="margin-top:0;">📦 상품 등록</h3>
        <input type="text" id="new-title" placeholder="상품명">
        <input type="text" id="new-price" placeholder="가격">
        <input type="file" id="new-file" accept="image/*">
        <button onclick="uploadToFirebase()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--primary); color:white; font-weight:bold; cursor:pointer;">등록하기</button>
    </div>

    <div id="product-grid"></div>

<script>
    const MY_PASS = "160102"; 
    const firebaseConfig = {
        apiKey: "AIzaSyAP0VBpecA379R6ZXbG0LS9ormq_MniKq4",
        authDomain: "dshop-f471f.firebaseapp.com",
        databaseURL: "https://dshop-f471f-default-rtdb.firebaseio.com",
        projectId: "dshop-f471f",
        storageBucket: "dshop-f471f.firebasestorage.app",
        messagingSenderId: "115747815211",
        appId: "1:115747815211:web:270d0371e919eca5f2cf6e"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function checkAdmin() {
        const pw = prompt("관리자 암호:");
        if (pw === MY_PASS) {
            alert("활성화!");
            document.getElementById('admin-panel').style.display = 'block';
        }
    }

    function renderProducts() {
        database.ref('products').on('value', (snap) => {
            const grid = document.getElementById('product-grid'); grid.innerHTML = "";
            const data = snap.val(); if(!data) return;
            for (let id in data) {
                const p = data[id];
                const card = document.createElement('div'); card.className = 'card';
                card.innerHTML = `<img src="${p.img}" class="image-box"><div style="font-weight:800; font-size:18px;">${p.title}</div><span class="price-tag">${p.price}</span><button class="btn-buy">구매하기</button>`;
                grid.appendChild(card);
            }
        });
    }
    renderProducts();
</script>
</body>
</html>
