<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다오이의 중고 장터!!!🛒</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #5865F2; --bg: #f8f9fd; --danger: #ff4b5c; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .upload-panel { background: white; padding: 25px; border-radius: 30px; margin-bottom: 40px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .upload-panel input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 2px solid #eee; box-sizing: border-box; }
        #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; }
        .card { background: white; padding: 20px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; position: relative; }
        .image-box { width: 100%; height: 200px; background: #f1f3f5; border-radius: 20px; margin-bottom: 15px; object-fit: cover; }
        .delete-btn { position: absolute; top: 15px; right: 15px; background: white; border: none; cursor: pointer; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; }
        .btn-buy { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="upload-panel">
        <h3>📢 상품 등록하기</h3>
        <input type="text" id="new-title" placeholder="상품 이름">
        <input type="text" id="new-price" placeholder="가격">
        <input type="file" id="new-file" accept="image/*" style="border:none;">
        <button onclick="uploadToFirebase()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--primary); color:white; font-weight:bold; cursor:pointer;">장터에 올리기</button>
    </div>

    <div id="product-grid"></div>

<script>
    // 다온님 Firebase 설정 (기존 키 그대로 쓰세요)
    const firebaseConfig = {
        apiKey: "AIzaSyAP0VBpecA379R6ZXbG0LS9ormq_MniKq4",
        authDomain: "dshop-f471f.firebaseapp.com",
        databaseURL: "https://dshop-f471f-default-rtdb.firebaseio.com",
        projectId: "dshop-f471f",
        storageBucket: "dshop-f471f.firebasestorage.app",
        messagingSenderId: "115747815211",
        appId: "1:115747815211:web:270d0371e919eca5f2cf6e"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // 데이터 불러오기
    database.ref('products').on('value', (snapshot) => {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = "";
        const data = snapshot.val();
        for (let id in data) {
            const product = data[id];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <button class="delete-btn" onclick="removeProduct('${id}')">×</button>
                <img src="${product.img}" class="image-box">
                <div style="font-weight:bold; font-size:18px;">${product.title}</div>
                <div style="color:var(--primary); margin-bottom:10px;">${product.price}</div>
                <button class="btn-buy">구매하기</button>
            `;
            grid.appendChild(card);
        }
    });

    // 🚀 파일 선택해서 올리기 기능
    function uploadToFirebase() {
        const title = document.getElementById('new-title').value;
        const price = document.getElementById('new-price').value;
        const fileInput = document.getElementById('new-file');
        const file = fileInput.files[0];

        if (!title || !price || !file) return alert("이름, 가격, 사진을 모두 넣어주세요!");

        // 파일을 읽어서 글자로 변환하기
        const reader = new FileReader();
        reader.onload = function(e) {
            const imageData = e.target.result; // 이게 변환된 이미지 데이터예요!
            
            // 파이어베이스에 저장
            database.ref('products').push({
                title: title,
                price: price,
                img: imageData
            }).then(() => {
                alert("장터에 올라갔습니다!");
                document.getElementById('new-title').value = "";
                document.getElementById('new-price').value = "";
                fileInput.value = "";
            });
        };
        reader.readAsDataURL(file);
    }

    function removeProduct(id) {
        if (prompt("'삭제할게요'를 입력하세요.") === "삭제할게요") {
            database.ref('products/' + id).remove();
        }
    }
</script>
</body>
</html>
