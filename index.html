<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velobuy</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    
    <style>
        :root { --primary: #5865F2; --bg: #f8f9fd; --success: #43b581; --gray: #99aab5; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #2c2f33; }
        
        /* 헤더 & 로고 스타일 */
        header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 10px 0; }
        .logo-container { cursor: pointer; display: flex; align-items: center; }
        .logo-img { height: 45px; object-fit: contain; }
        .logo-text { font-size: 26px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }
        .admin-link { font-size: 11px; color: #ddd; text-decoration: none; transition: 0.3s; }
        .admin-link:hover { color: var(--primary); }

        /* 관리자 패널 */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 30px; margin-bottom: 40px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--primary); }
        #admin-panel input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 2px solid #eee; box-sizing: border-box; font-family: inherit; }

        /* 상품 카드 그리드 */
        #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; }
        .card { background: white; padding: 20px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; position: relative; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
        .image-box { width: 100%; height: 220px; background: #eee; border-radius: 20px; margin-bottom: 15px; object-fit: cover; }
        .price-tag { color: var(--primary); font-weight: 800; font-size: 22px; margin-bottom: 15px; display: block; }
        .btn-buy { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* 주문 모달 */
        #order-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        
        .method-selector { display: flex; gap: 10px; margin-bottom: 20px; background: #f1f3f5; padding: 5px; border-radius: 15px; }
        .method-btn { flex: 1; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: bold; color: #666; transition: 0.3s; border: none; }
        .method-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .info-box { background: #f8f9fd; padding: 20px; border-radius: 20px; margin-bottom: 20px; display: none; font-size: 15px; line-height: 1.6; }
        .info-box.active { display: block; animation: fadeIn 0.3s ease; }
        
        .modal-content input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 2px solid #eee; box-sizing: border-box; font-size: 15px; }
        .submit-btn { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 17px; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="location.reload()">
            <img id="logo-img" src="" class="logo-img" style="display:none;" alt="Logo">
            <span id="logo-text" class="logo-text">Velobuy</span>
        </div>
        <a href="javascript:void(0)" class="admin-link" onclick="checkAdmin()">Admin Panel</a>
    </header>

    <div id="admin-panel">
        <h3 style="margin-top:0;">📦 상품 추가 (다온 사장님)</h3>
        <input type="text" id="new-title" placeholder="상품명">
        <input type="text" id="new-price" placeholder="판매 가격 (예: 25,000원)">
        <input type="file" id="new-file" accept="image/*">
        <button onclick="uploadToFirebase()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--primary); color:white; font-weight:bold; cursor:pointer;">장터에 등록하기</button>
    </div>

    <div id="product-grid"></div>

    <div id="order-modal">
        <div class="modal-content">
            <h3 id="modal-item-title" style="margin-top:0; font-size:22px;">상품 주문</h3>
            
            <div class="method-selector">
                <button class="method-btn active" id="btn-pay" onclick="setMethod('pay')">무통장 입금</button>
                <button class="method-btn" id="btn-offline" onclick="setMethod('offline')">오프라인 직거래</button>
            </div>

            <div id="pay-info" class="info-box active">
                <span style="color:#888; font-size:13px;">입금 계좌번호</span><br>
                <strong style="font-size:18px; color:var(--primary);">1908-3844-6690</strong><br>
                <span style="font-weight:bold;">황다온</span>
            </div>

            <div id="offline-info" class="info-box">
                <strong style="color:var(--success); font-size:18px;">🤝 직거래 신청</strong><br>
                <span style="color:#666;">만나서 결제하고 물건을 받습니다.<br>연락처를 남겨주시면 연락드릴게요!</span>
            </div>

            <input type="text" id="buyer-name" placeholder="구매자 성함(입금자명)">
            <input type="tel" id="buyer-phone" placeholder="전화번호 (예: 01012345678)">
            
            <button class="submit-btn" onclick="submitOrder()">주문하기</button>
            <button style="background:none; border:none; color:#bbb; margin-top:15px; cursor:pointer; font-weight:bold;" onclick="closeModal()">취소</button>
        </div>
    </div>

<script>
    // ----------------------------------------------------

    const ADMIN_PASSWORD_HASH = "160102"; // '160102'

    // ----------------------------------------------------
    // 2. 초기 로고 설정
    // ----------------------------------------------------
    const lImg = document.getElementById('logo-img');
    const lTxt = document.getElementById('logo-text');
    if(LOGO_IMAGE_URL) {
        lImg.src = LOGO_IMAGE_URL;
        lImg.style.display = 'block';
        lTxt.style.display = 'none';
    }

    // ----------------------------------------------------
    // 3. 파이어베이스 및 기타 설정
    // ----------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyAP0VBpecA379R6ZXbG0LS9ormq_MniKq4",
        authDomain: "dshop-f471f.firebaseapp.com",
        databaseURL: "https://dshop-f471f-default-rtdb.firebaseio.com",
        projectId: "dshop-f471f",
        storageBucket: "dshop-f471f.firebasestorage.app",
        messagingSenderId: "115747815211",
        appId: "1:115747815211:web:270d0371e919eca5f2cf6e"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const WEBHOOK = "https://discord.com/api/webhooks/1494592552282886198/fTv0BPP56UizsSaR_PYkxwd1L9QWU3BWUVJPHSgbFUk1FaHhnIzJKX_7futJLQHb2amW"; 
    
    let isAdmin = false;
    let currentItem = {};
    let selectedMethod = 'pay';

    // 관리자 로그인
    function checkAdmin() {
        const pw = prompt("관리자 암호를 입력하세요.");
        if (!pw) return;
        if (CryptoJS.SHA256(pw).toString() === ADMIN_PASSWORD_HASH) {
            alert("관리자 모드 활성화!");
            isAdmin = true;
            document.getElementById('admin-panel').style.display = 'block';
            renderProducts();
        } else { alert("비밀번호가 틀렸습니다."); }
    }

    // 결제 방법 선택
    function setMethod(m) {
        selectedMethod = m;
        document.getElementById('btn-pay').classList.toggle('active', m === 'pay');
        document.getElementById('btn-offline').classList.toggle('active', m === 'offline');
        document.getElementById('pay-info').classList.toggle('active', m === 'pay');
        document.getElementById('offline-info').classList.toggle('active', m === 'offline');
    }

    // 상품 리스트 불러오기
    function renderProducts() {
        database.ref('products').on('value', (snap) => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            const data = snap.val();
            if(!data) return;
            for (let id in data) {
                const p = data[id];
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    ${isAdmin ? `<button style="position:absolute;top:15px;right:15px;background:rgba(255,0,0,0.8);color:white;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-weight:bold;" onclick="removeProduct('${id}')">×</button>` : ''}
                    <img src="${p.img}" class="image-box">
                    <div style="font-weight:800; font-size:19px; margin-bottom:8px;">${p.title}</div>
                    <span class="price-tag">${p.price}</span>
                    <button class="btn-buy" onclick="openModal('${p.title}', '${p.price}')">구매하기</button>
                `;
                grid.appendChild(card);
            }
        });
    }

    renderProducts();

    // 상품 업로드 (이미지 압축 포함)
    function uploadToFirebase() {
        if(!isAdmin) return;
        const title = document.getElementById('new-title').value;
        const price = document.getElementById('new-price').value;
        const file = document.getElementById('new-file').files[0];
        if(!title || !price || !file) return alert("내용을 모두 채워주세요!");

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 500;
                canvas.height = (img.height * 500) / img.width;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                database.ref('products').push({
                    title, price, img: canvas.toDataURL('image/jpeg', 0.7), seller: "황다온"
                }).then(() => { alert("등록 완료!"); location.reload(); });
            };
        };
        reader.readAsDataURL(file);
    }

    function openModal(t, p) {
        currentItem = { t, p };
        document.getElementById('modal-item-title').innerText = t;
        document.getElementById('order-modal').style.display = 'flex';
        setMethod('pay');
    }

    function closeModal() { document.getElementById('order-modal').style.display = 'none'; }

    // 주문 제출 (디스코드 전송)
    function submitOrder() {
        const name = document.getElementById('buyer-name').value;
        const phone = document.getElementById('buyer-phone').value;
        if(!name || !phone) return alert("정보를 입력해주세요!");

        const methodTxt = selectedMethod === 'pay' ? "💳 무통장 입금" : "🤝 오프라인 직거래";

        fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                embeds: [{
                    title: `📢 신규 주문 접수!`,
                    description: `**상품명:** ${currentItem.t}\n**가격:** ${currentItem.p}\n\n**결제방식:** ${methodTxt}\n**주문자:** ${name}\n**연락처:** ${phone}`,
                    color: selectedMethod === 'pay' ? 5814783 : 4437377,
                    timestamp: new Date()
                }]
            })
        }).then(() => {
            alert("주문이 정상적으로 접수되었습니다!");
            closeModal();
        });
    }

    function removeProduct(id) {
        if(confirm("정말 삭제하시겠습니까?")) database.ref('products/'+id).remove();
    }

    // 방문 로거
    fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
        fetch(WEBHOOK, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content: `🔔 방문자 발생 (IP: ${d.ip})` })
        });
    });
</script>
</body>
</html>
