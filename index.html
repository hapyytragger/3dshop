<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velobuy</title>
    
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    
    <style>
        :root { --primary: #5865F2; --bg: #f8f9fd; --success: #43b581; --gray: #99aab5; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #2c2f33; }
        
        /* 헤더 & 로고 중앙 정렬 */
        header { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; padding: 20px 0; }
        .logo-container { cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .logo-img { height: 60px; object-fit: contain; margin-bottom: 10px; }
        .logo-text { font-size: 32px; font-weight: 900; color: var(--primary); letter-spacing: -1.5px; }

        /* 2. 관리자 패널 버튼을 오른쪽 맨 아래로 고정 */
        .admin-link { 
            position: fixed; 
            bottom: 15px; 
            right: 15px; 
            font-size: 11px; 
            color: #ccc; 
            text-decoration: none; 
            background: rgba(255,255,255,0.7);
            padding: 4px 8px;
            border-radius: 8px;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }
        .admin-link:hover { color: var(--primary); background: white; border: 1px solid #eee; }

        /* 관리자 입력창 */
        #admin-panel { display: none; background: white; padding: 25px; border-radius: 30px; margin-bottom: 40px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--primary); }
        #admin-panel input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 2px solid #eee; box-sizing: border-box; }

        /* 상품 카드 스타일 */
        #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; }
        .card { background: white; padding: 20px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; position: relative; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .image-box { width: 100%; height: 220px; background: #eee; border-radius: 20px; margin-bottom: 15px; object-fit: cover; }
        .price-tag { color: var(--primary); font-weight: 800; font-size: 22px; margin-bottom: 15px; display: block; }
        .btn-buy { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 18px; font-weight: bold; cursor: pointer; }

        /* 모달 스타일 */
        #order-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; }
        .method-selector { display: flex; gap: 10px; margin-bottom: 20px; background: #f1f3f5; padding: 5px; border-radius: 15px; }
        .method-btn { flex: 1; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: bold; color: #666; border: none; }
        .method-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .info-box { background: #f8f9fd; padding: 20px; border-radius: 20px; margin-bottom: 20px; display: none; font-size: 15px; }
        .info-box.active { display: block; }
        .modal-content input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 2px solid #eee; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="location.reload()">
            <img id="logo-img" src="" class="logo-img" style="display:none;" alt="Logo">
            <span id="logo-text" class="logo-text">Velobuy</span>
        </div>
    </header>

    <a href="javascript:void(0)" class="admin-link" onclick="checkAdmin()">Admin Panel</a>

    <div id="admin-panel">
        <h3 style="margin-top:0;">📦 상품 등록</h3>
        <input type="text" id="new-title" placeholder="상품명">
        <input type="text" id="new-price" placeholder="가격 (예: 25,000원)">
        <input type="file" id="new-file" accept="image/*">
        <button onclick="uploadToFirebase()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--primary); color:white; font-weight:bold; cursor:pointer;">장터 등록</button>
    </div>

    <div id="product-grid"></div>

    <div id="order-modal">
        <div class="modal-content">
            <h3 id="modal-item-title" style="margin-top:0; font-size:22px;">상품 주문</h3>
            <div class="method-selector">
                <button class="method-btn active" id="btn-pay" onclick="setMethod('pay')">무통장 입금</button>
                <button class="method-btn" id="btn-offline" onclick="setMethod('offline')">오프라인 직거래</button>
            </div>
            <div id="pay-info" class="info-box active">
                <span style="color:#888; font-size:13px;">입금 계좌번호</span><br>
                <strong style="font-size:18px; color:var(--primary);">1908-3844-6690</strong><br>
                <span style="font-weight:bold;">황다온</span>
            </div>
            <div id="offline-info" class="info-box">
                <strong style="color:var(--success); font-size:18px;">🤝 직거래 신청</strong><br>
                <span>만나서 결제하고 물건을 받습니다.</span>
            </div>
            <input type="text" id="buyer-name" placeholder="구매자 성함">
            <input type="tel" id="buyer-phone" placeholder="전화번호">
            <button class="submit-btn" onclick="submitOrder()">주문하기</button>
            <button style="background:none; border:none; color:#bbb; margin-top:15px; cursor:pointer;" onclick="closeModal()">취소</button>
        </div>
    </div>

<script>
    // ----------------------------------------------------
    // 설정 (사장님 로고 이미지는 여기에 주소 넣기)
    // ----------------------------------------------------
    const LOGO_IMAGE_URL = ""; 
    const ADMIN_PASSWORD_HASH = "8b5020f0119e735232d3623910c2c31e6b8253108c9f37c3525287f329971e41"; // '160102'

    const lImg = document.getElementById('logo-img');
    const lTxt = document.getElementById('logo-text');
    if(LOGO_IMAGE_URL) {
        lImg.src = LOGO_IMAGE_URL; lImg.style.display = 'block'; lTxt.style.display = 'none';
    }

    const firebaseConfig = {
        apiKey: "AIzaSyAP0VBpecA379R6ZXbG0LS9ormq_MniKq4",
        authDomain: "dshop-f471f.firebaseapp.com",
        databaseURL: "https://dshop-f471f-default-rtdb.firebaseio.com",
        projectId: "dshop-f471f",
        storageBucket: "dshop-f471f.firebasestorage.app",
        messagingSenderId: "115747815211",
        appId: "1:115747815211:web:270d0371e919eca5f2cf6e"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const WEBHOOK = "https://discord.com/api/webhooks/1494592552282886198/fTv0BPP56UizsSaR_PYkxwd1L9QWU3BWUVJPHSgbFUk1FaHhnIzJKX_7futJLQHb2amW"; 
    
    let isAdmin = false;
    let currentItem = {};
    let selectedMethod = 'pay';

    function checkAdmin() {
        const pw = prompt("암호 입력");
        if (CryptoJS.SHA256(pw).toString() === ADMIN_PASSWORD_HASH) {
            isAdmin = true;
            document.getElementById('admin-panel').style.display = 'block';
            renderProducts();
        } else { alert("비밀번호 틀림"); }
    }

    function setMethod(m) {
        selectedMethod = m;
        document.getElementById('btn-pay').classList.toggle('active', m === 'pay');
        document.getElementById('btn-offline').classList.toggle('active', m === 'offline');
        document.getElementById('pay-info').classList.toggle('active', m === 'pay');
        document.getElementById('offline-info').classList.toggle('active', m === 'offline');
    }

    function renderProducts() {
        database.ref('products').on('value', (snap) => {
            const grid = document.getElementById('product-grid'); grid.innerHTML = "";
            const data = snap.val(); if(!data) return;
            for (let id in data) {
                const p = data[id];
                const card = document.createElement('div'); card.className = 'card';
                card.innerHTML = `
                    ${isAdmin ? `<button style="position:absolute;top:10px;right:10px;background:red;color:white;border:none;border-radius:50%;width:25px;height:25px;cursor:pointer;" onclick="removeProduct('${id}')">×</button>` : ''}
                    <img src="${p.img}" class="image-box">
                    <div style="font-weight:800; font-size:18px;">${p.title}</div>
                    <span class="price-tag">${p.price}</span>
                    <button class="btn-buy" onclick="openModal('${p.title}', '${p.price}')">구매하기</button>
                `;
                grid.appendChild(card);
            }
        });
    }

    renderProducts();

    function uploadToFirebase() {
        if(!isAdmin) return;
        const title = document.getElementById('new-title').value;
        const price = document.getElementById('new-price').value;
        const file = document.getElementById('new-file').files[0];
        if(!title || !price || !file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 500; canvas.height = (img.height * 500) / img.width;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                database.ref('products').push({
                    title, price, img: canvas.toDataURL('image/jpeg', 0.7)
                }).then(() => location.reload());
            };
        };
        reader.readAsDataURL(file);
    }

    function openModal(t, p) {
        currentItem = { t, p };
        document.getElementById('modal-item-title').innerText = t;
        document.getElementById('order-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('order-modal').style.display = 'none'; }

    function submitOrder() {
        const name = document.getElementById('buyer-name').value;
        const phone = document.getElementById('buyer-phone').value;
        if(!name || !phone) return;
        fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                embeds: [{
                    title: `📢 새 주문!`,
                    description: `**상품:** ${currentItem.t}\n**방식:** ${selectedMethod}\n**이름:** ${name}\n**번호:** ${phone}`
                }]
            })
        }).then(() => { alert("주문 완료!"); closeModal(); });
    }

    function removeProduct(id) {
        if(confirm("삭제?")) database.ref('products/'+id).remove();
    }
</script>
</body>
</html>
